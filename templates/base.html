<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Evolve ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 no-print">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">EVOLVE GESTIONALE</a>
            {% if current_user.is_authenticated %}
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/dashboard">Dashboard</a>
                <a class="nav-link" href="/warehouse">Magazzino</a>
                <a class="nav-link" href="/technicians">Tecnici</a>
                <a class="nav-link text-danger" href="/logout">Esci</a>
            </div>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <style>@media print { .no-print { display: none; } }</style>
</body>
</html>
