{% extends 'base.html' %}
{% block content %}
<div class="card p-4 mb-4 shadow-sm">
    <h4>Aggiungi Nuovo Tecnico</h4>
    <form method="POST" class="row g-3">
        <div class="col-md-5"><input type="text" name="name" class="form-control" placeholder="Nome Completo" required></div>
        <div class="col-md-5"><input type="text" name="phone" class="form-control" placeholder="Telefono"></div>
        <div class="col-md-2"><button class="btn btn-success w-100">Salva</button></div>
    </form>
</div>
<table class="table bg-white shadow-sm">
    <thead><tr><th>Nome</th><th>Telefono</th><th>Azioni</th></tr></thead>
    <tbody>
        {% for t in techs %}
        <tr><td>{{ t.name }}</td><td>{{ t.phone }}</td><td><button class="btn btn-sm btn-info">Scheda</button></td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
