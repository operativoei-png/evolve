{% extends 'base.html' %}
{% block content %}
<div class="card p-4 mb-4 border-0 shadow-sm">
    <h4 class="mb-3 text-primary">Aggiungi Nuovo Tecnico</h4>
    <form method="POST" class="row g-3">
        <div class="col-md-4">
            <input type="text" name="name" class="form-control" placeholder="Nome Completo" required>
        </div>
        <div class="col-md-3">
            <input type="text" name="phone" class="form-control" placeholder="Telefono">
        </div>
        <div class="col-md-3">
            <input type="text" name="plate" class="form-control" placeholder="Targa Furgone">
        </div>
        <div class="col-md-2">
            <button class="btn btn-primary w-100">Salva</button>
        </div>
    </form>
</div>

<div class="card border-0 shadow-sm overflow-hidden">
    <table class="table table-hover mb-0">
        <thead class="table-dark">
            <tr>
                <th>Nome</th>
                <th>Contatto</th>
                <th>Furgone</th>
                <th class="text-end">Azioni</th>
            </tr>
        </thead>
        <tbody>
            {% for t in techs %}
            <tr>
                <td class="fw-bold">{{ t.name }}</td>
                <td>{{ t.phone if t.phone else '-' }}</td>
                <td><span class="badge bg-secondary">{{ t.van_plate if t.van_plate else 'N/A' }}</span></td>
                <td class="text-end">
                    <a href="/technician/{{ t.id }}" class="btn btn-sm btn-outline-primary">Gestisci Dotazione</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
