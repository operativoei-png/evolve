{% extends 'base.html' %}
{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card shadow-sm p-4 text-center">
            <h3>{{ tech.name }}</h3>
            <p class="badge bg-primary fs-6">{{ tech.van_plate }}</p>
            <hr>
            <a href="/technicians" class="btn btn-sm btn-secondary">Torna alla lista</a>
        </div>
    </div>

    <div class="col-md-8">
        <div class="card shadow-sm mb-4 border-warning">
            <div class="card-body">
                <h5 class="fw-bold"><i class="fas fa-barcode"></i> ASSEGNA CON PISTOLA BARCODE</h5>
                <form action="/assign/{{ tech.id }}" method="POST" class="d-flex gap-2">
                    <input type="text" name="barcode_serial" class="form-control" placeholder="Spara qui il seriale dell'attrezzo..." autofocus required>
                    <button class="btn btn-warning fw-bold">ASSEGNA</button>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white fw-bold">DOTAZIONE ATTUALE</div>
            <table class="table mb-0">
                <thead><tr><th>Modello</th><th>Seriale (S/N)</th><th>Descrizione</th></tr></thead>
                <tbody>
                    {% for item in tech.items %}
                    <tr><td>{{ item.code }}</td><td>{{ item.serial }}</td><td>{{ item.description }}</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
